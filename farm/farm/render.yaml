# Render blueprint for the FarmERP Django API (ASGI + WebSockets).
# Frontend goes to Vercel; database is Supabase (set DATABASE_URL in the dashboard).
services:
  - type: web
    name: farmerp-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput"
    # Daphne (ASGI) so Channels WebSockets (live GPS) work.
    startCommand: "daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    healthCheckPath: /api/docs/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: SECRET_KEY
        generateValue: true        # Render generates a strong secret
      - key: DEBUG
        value: "false"
      # Set these in the Render dashboard (Environment tab) — never commit secrets:
      - key: DATABASE_URL
        sync: false                # your Supabase connection string
      - key: ALLOWED_HOSTS
        sync: false                # e.g. farmerp-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false                # e.g. https://your-app.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        sync: false                # e.g. https://your-app.vercel.app
