<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#15803d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FarmERP" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="FarmERP" />
    <meta name="msapplication-TileColor" content="#15803d" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="description" content="Enterprise Farm ERP platform for agricultural and plantation management" />
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icons/icon-512.svg" sizes="512x512" />
    <!-- Microsoft Tile -->
    <meta name="msapplication-TileImage" content="/icons/icon-512.svg" />
    <!-- PWA Manifest (injected by vite-plugin-pwa) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>FarmERP Pro — Smart Farm Management</title>
    <!-- Splash screen styles (hidden once React mounts) -->
    <style>
      .pwa-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
        transition: opacity 0.5s ease-out;
      }
      .pwa-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .pwa-splash svg {
        width: 80px;
        height: 80px;
        margin-bottom: 16px;
        animation: splash-pulse 1.5s ease-in-out infinite;
      }
      .pwa-splash h1 {
        color: white;
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }
      .pwa-splash .badge {
        display: inline-block;
        background: rgba(255,255,255,0.2);
        color: white;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 3px 10px;
        border-radius: 6px;
        margin-top: 4px;
      }
      .pwa-splash .dots {
        display: flex;
        gap: 6px;
        margin-top: 24px;
      }
      .pwa-splash .dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255,255,255,0.6);
        animation: splash-bounce 1.2s ease-in-out infinite;
      }
      .pwa-splash .dots span:nth-child(2) { animation-delay: 0.2s; }
      .pwa-splash .dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.85; }
      }
      @keyframes splash-bounce {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- PWA Splash Screen -->
    <div id="pwa-splash" class="pwa-splash">
      <svg width="80" height="80" viewBox="0 0 48 48" aria-label="FarmERP Pro">
        <defs>
          <linearGradient id="splashGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#4ade80" />
            <stop offset="100%" stop-color="#15803d" />
          </linearGradient>
        </defs>
        <rect width="48" height="48" rx="13" fill="url(#splashGrad)" />
        <g transform="translate(10,9) scale(1.15)" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z" fill="#ffffff" />
          <path d="M2 21c0-3 1.85-5.36 5.08-6" />
        </g>
      </svg>
      <h1>FarmERP <span class="badge">Pro</span></h1>
      <p style="color: rgba(255,255,255,0.7); font-size: 13px; font-family: 'Inter', system-ui, sans-serif; margin-top: 4px;">Loading your farm dashboard...</p>
      <div class="dots">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide the splash screen once React mounts (root has content)
      const splashObserver = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          document.getElementById('pwa-splash')?.classList.add('hidden');
          splashObserver.disconnect();
        }
      });
      splashObserver.observe(document.getElementById('root'), { childList: true, subtree: true });
      // Fallback: hide splash after 5s max
      setTimeout(() => {
        document.getElementById('pwa-splash')?.classList.add('hidden');
      }, 5000);
    </script>
  </body>
</html>
